<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>PCB 价目表管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;background:#f5f7fa;color:#1a1a2e;padding:20px;min-width:900px}
h1{font-size:20px;font-weight:700}.sub{color:#999;font-size:12px;margin:4px 0 16px}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;align-items:center}
.btn{height:34px;padding:0 14px;border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-pri{background:#3664fb;color:#fff}.btn-pri:hover{background:#2952d8}
.btn-out{background:#fff;color:#3664fb;border:1px solid #3664fb}.btn-out:hover{background:#f0f5ff}
.btn-del{background:#e74c3c;color:#fff}.btn-del:hover{background:#c0392b}
.btn-grn{background:#22a022;color:#fff}.btn-grn:hover{background:#1a7d1a}
.btn-admin{background:#fef0c7;color:#8b6914;border:1px solid #f5a623;height:28px;font-size:11px;padding:0 10px}
.btn-admin.active{background:#f5a623;color:#fff}
.table-wrap{overflow-x:auto;overflow-y:visible;background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-top:12px}
table{border-collapse:collapse;font-size:12px;min-width:1800px;width:max-content}
th,td{border:1px solid #eef1f5;padding:6px 8px;text-align:center;white-space:nowrap}
th{background:#f8fafd;font-weight:600;font-size:11px;color:#666;position:sticky;top:0;z-index:1}
th.sup{background:#eef3ff;color:#3664fb;font-size:12px}
 input{width:85px;border:1px solid #e8ecf0;border-radius:6px;padding:5px 6px;font-size:12px;text-align:center;outline:none;transition:border-color .15s;background:#fff}
 input:focus{border-color:#3664fb;background:#fafcff}
 input.pc{background:#fffdf5;width:65px}
 input:read-only{background:#f3f5f8;color:#666;cursor:default;border-color:#e8ecf0}
 input:read-only:focus{background:#f3f5f8;border-color:#e8ecf0;box-shadow:none}
 .sup-tag{display:inline-block;background:#eef3ff;color:#3664fb;padding:4px 12px;border-radius:6px;font-size:13px;font-weight:600}
.gr td{background:#eef3ff;font-weight:600;text-align:left;padding:8px 12px;border-top:2px solid #3664fb;color:#3664fb;font-size:13px;border-bottom:none}
.rn{font-size:9px;color:#bbb;width:30px;min-width:30px}
.notebox{background:#fffdf5;border:1px solid #fef0c7;border-radius:8px;padding:12px 16px;margin-top:14px;font-size:11px;color:#8b6914;line-height:1.7}
.st{font-size:11px;color:#22a022;margin-left:10px}
.sup-section{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:10px 0;padding:12px 16px;background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.sup-card{background:#f8fafd;border:1px solid #eef1f5;border-radius:10px;padding:12px 14px;min-width:180px}
.sup-card .sup-name{font-size:13px;font-weight:600;color:#1a1a2e;margin-bottom:4px}
.sup-card .sup-subs{font-size:11px;color:#888}
.sup-card .sup-del{background:none;border:none;color:#e74c3c;cursor:pointer;font-size:11px;padding:2px 6px;border-radius:4px;display:none}
.sup-card .sup-del.visible{display:inline-block}
.sup-card .sup-del:hover{background:#fde8e8}
</style><script src="auth.js"></script></head><body>
<h1>📋 PCB 价目表管理</h1>
<div id="adminContent">
<p class="sub">数据保存在浏览器本地。增/删/改供应商单价后点"保存"。</p>

   <button class="btn btn-pri" onclick="addRow()">+ 新增行</button>
   <button class="btn btn-pri" onclick="addSupplier()">+ 新增供应商</button>
   <button class="btn btn-del" onclick="deleteSupplier()">- 删除供应商</button>
   <button class="btn btn-grn" onclick="saveAll()">💾 保存</button>
   <button class="btn btn-out" onclick="exportJSON()">📤 导出JSON</button>
   <button class="btn btn-out" onclick="importJSON()">📥 导入JSON</button>
   <button class="btn btn-del" onclick="resetAll()">🔄 重置</button>
   <span class="st" id="st"></span>
 </div>

   <div style="font-weight:600;color:#555;margin-right:8px">供应商：</div>

 </div>

  sm.forEach(function(s){s.subs.forEach(function(sb){hdr+='<th style="font-size:10px">'+sb.label+'</th>'})});
  hdr+='<th></th></tr>';document.getElementById("th").innerHTML=hdr;

    var vs=new Set();pd.forEach(function(r){if(r[f])vs.add(r[f])});

  });

  var h=dls,lm="";

     });

  });

}

 function deleteSupplier(){
   if(sm.length===0){alert("暂无供应商可删除");return}
   var choices=sm.map(function(s,i){return (i+1)+". "+s.name}).join("\n");
   var idx=prompt("选择要删除的供应商：\n"+choices+"\n\n输入编号 (1-"+sm.length+")：");
   if(!idx)return;idx=parseInt(idx);
   if(isNaN(idx)||idx<1||idx>sm.length){alert("无效选择");return}
   delSup(sm[idx-1].id)
 }
function addSupplier(){
  var n=prompt("供应商名称：");if(!n||!n.trim())return;
  var id=n.replace(/[^a-zA-Z0-9]/g,"").toLowerCase();
  if(sm.some(function(s){return s.id===id})){alert("已存在");return}
  var subs=[{id:id+"_osp",label:"OSP"},{id:id+"_exp",label:"曝光+15"},{id:id+"_spray",label:"喷锡+15"}];
  sm.push({id:id,name:n.trim(),subs:subs});pd.forEach(function(r){subs.forEach(function(s){r[s.id]=null})});saveAll()}
 function delSup(sid){
   var s=sm.find(function(x){return x.id===sid});if(!s)return;
   if(!confirm("⚠ 删除供应商 "+s.name+"？\n\n所有该供应商的价格数据将被清除！此操作不可恢复。"))return;
   var cols=s.subs.map(function(sb){return sb.id});
   pd.forEach(function(r){cols.forEach(function(c){delete r[c]})});
   sm=sm.filter(function(x){return x.id!==sid});

 }
