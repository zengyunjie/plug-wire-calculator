<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成本测算工具集</title>
<style>
  :root {
    --primary: #1a6fc4;
    --primary-light: #e8f3ff;
    --accent: #0ea5e9;
    --green: #22c55e;
    --green-light: #f0fdf4;
    --orange: #f97316;
    --orange-light: #fff7ed;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-500: #6b7280;
    --gray-700: #374151;
    --gray-900: #111827;
    --border-radius: 12px;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #667eea10 0%, #764ba220 100%);
    background-color: #f0f4f8;
    color: var(--gray-700);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .hub {
    max-width: 800px;
    width: 100%;
    text-align: center;
  }
  .hub-header { margin-bottom: 40px; }
  .hub-header h1 {
    font-size: 32px;
    font-weight: 800;
    color: var(--gray-900);
    margin-bottom: 8px;
  }
  .hub-header p { font-size: 15px; color: var(--gray-500); }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .tool-card {
    background: #fff;
    border-radius: var(--border-radius);
    box-shadow: var(--shadow);
    padding: 36px 28px;
    text-decoration: none;
    color: inherit;
    transition: all 0.25s ease;
    border: 2px solid transparent;
    cursor: pointer;
  }
  .tool-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
    border-color: var(--primary);
  }
  .tool-card .icon {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    margin: 0 auto 18px;
  }
  .tool-card:nth-child(1) .icon { background: var(--primary-light); }
  .tool-card:nth-child(2) .icon { background: var(--orange-light); }
  .tool-card h2 { font-size: 20px; font-weight: 700; color: var(--gray-900); margin-bottom: 8px; }
  .tool-card p { font-size: 13px; color: var(--gray-500); line-height: 1.6; }
  .tool-card .arrow {
    margin-top: 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--primary);
  }
  .footer {
    margin-top: 40px;
    font-size: 12px;
    color: var(--gray-500);
  }
  @media (max-width: 600px) {
    .cards { grid-template-columns: 1fr; }
    .hub-header h1 { font-size: 24px; }
    .tool-card { padding: 28px 20px; }
  }
</style>
</head>
<body>
<div class="hub">
  <div class="hub-header">
    <h1>成本测算工具集</h1>
    <p>选择工具开始计算成本</p>
  </div>
  <div class="cards">
    <a class="tool-card" href="plug-wire.html">
      <div class="icon">🔌</div>
      <h2>插头线成本计价</h2>
      <p>支持美规两芯/三芯多规格<br>线材规格 · 材质支数分配<br>配件 · 加工费 · 含税总成本</p>
      <div class="arrow">进入工具 →</div>
    </a>
    <a class="tool-card" href="packaging-aluminum.html">
      <div class="icon">📦</div>
      <h2>包装 & 铝材成本测算</h2>
      <p>纸盒 · 外箱 · 纸卡 · 珍珠棉<br>铝材原材料 · 加工 · 表面处理<br>含税成本实时自动计算</p>
      <div class="arrow">进入工具 →</div>
    </a>
  </div>
  <div class="footer">所有计算均在本地浏览器完成，数据不会上传至任何服务器</div>
</div>
</body>
</html>
