function selectSpec(f,v){if(selectedSpec[f]===v)selectedSpec[f]=null;else selectedSpec[f]=v;renderSpecs();calcPanel()}
function selectVia(v){selectedSpec.via=v;renderSpecs();calcPanel()}
function selectProc(p){selectedProc=(selectedProc===p)?null:p;renderSpecs();updateComparison()}
function onQtyChange(){var t=parseInt(document.getElementById("targetQty").value)||0;if(t===1)document.getElementById("edgeW").value=0;calcPanel()}

function calcPanel(){
  var L=parseFloat(document.getElementById("boardL").value)||0,W=parseFloat(document.getElementById("boardW").value)||0,tq=parseInt(document.getElementById("targetQty").value)||0,edge=parseFloat(document.getElementById("edgeW").value)||0,maxAR=parseFloat(document.getElementById("maxAR").value)||2,eqMaxW=parseFloat(document.getElementById("eqMaxW").value)||250,eqMaxH=parseFloat(document.getElementById("eqMaxH").value)||360,eqMinW=parseFloat(document.getElementById("eqMinW").value)||50;
  if(!L||!W){document.getElementById("panelResult").style.display="none";document.getElementById("resultCard").style.display="none";return}
  var sa=L*W,ori=[{bw:W,bh:L},{bw:L,bh:W}],gaps=[0,2];panelResults=[];var sk=new Set();
  for(var rows=1;rows<=30;rows++){for(var cols=1;cols<=30;cols++){var qty=rows*cols;if(tq>0&&qty!==tq)continue;for(var oi=0;oi<2;oi++){for(var gi=0;gi<2;gi++){var g=gaps[gi];for(var es=0;es<=1;es++){var pw,ph;
    if(es===0){pw=cols*ori[oi].bw+(cols-1)*g+2*edge;ph=rows*ori[oi].bh+(rows-1)*g}
    else{pw=cols*ori[oi].bw+(cols-1)*g;ph=rows*ori[oi].bh+(rows-1)*g+2*edge}
    var fw=Math.min(pw,ph),fh=Math.max(pw,ph);if(fw<eqMinW||fw>eqMaxW||fh>eqMaxH||fh/fw>maxAR)continue;
    var util=qty*sa/(fw*fh)*100;if(util>100)continue;
    panelResults.push({rows:rows,cols:cols,qty:qty,util:util,pw:fw,ph:fh,method:g===0?"V-CUT":"邮票孔",area:fw*fh/1e6});
  }}}}}
  panelResults.sort(function(a,b){return b.util-a.util});selectedArrIdx=0;var div=document.getElementById("panelResult");
  if(panelResults.length===0){div.style.display="block";div.innerHTML='<div class="pr"><span style="color:#b91c1c">无可行拼版方案</span></div>';updateComparison();return}
  var b=panelResults[0];div.style.display="block";
  div.innerHTML='<div class="pr"><div class="pv"><div class="hd">排列</div><div class="vl">'+b.rows+'行x'+b.cols+'列</div></div><div class="pv"><div class="hd">拼板数</div><div class="vl">'+b.qty+'片</div></div><div class="pv"><div class="hd">拼板尺寸</div><div class="vl">'+b.pw+'x'+b.ph+'mm</div></div><div class="pv"><div class="hd">面积</div><div class="vl">'+b.area.toFixed(4)+'m²</div></div><div class="pv"><div class="hd">利用率</div><div class="vl">'+b.util.toFixed(1)+'%</div></div><div class="pv"><div class="hd">方式</div><div class="vl" style="font-size:13px">'+b.method+'</div></div></div>';
  var sel='<div style="margin-top:8px;font-size:11px;color:#999">其他方案：<select onchange="selectAlt(this.value)" style="font-size:11px;padding:2px 4px;line-height:1.3;border-radius:6px;border:1px solid #e2e6ed;width:100%;max-width:600px;height:auto;min-height:0">';
  var tq=parseInt(document.getElementById("targetQty").value)||0;var tq=parseInt(document.getElementById("targetQty").value)||0;var maxShow=tq===0?Math.min(50,panelResults.length):10;panelResults.slice(0,maxShow).forEach(function(r,i){sel+='<option value="'+i+'">'+(i+1)+'. '+r.rows+'x'+r.cols+' ('+r.qty+'片) '+r.pw+'x'+r.ph+'mm | '+r.util.toFixed(1)+'% | '+r.method+'</option>'});
  sel+='</select></div>';div.innerHTML+=sel;updateComparison();
}

function matchPrices(){var fl={};for(var k in selectedSpec){if(k!=="via")fl[k]=selectedSpec[k]}return priceData.filter(function(r){var ok=true;for(var k in fl){if(fl[k]&&r[k]!==fl[k])ok=false}return ok})}

function updateComparison(){
  var matches=matchPrices(),card=document.getElementById("resultCard"),body=document.getElementById("cb"),info=document.getElementById("matchInfo");
  if(matches.length===0||panelResults.length===0){card.style.display="block";var m1=matches.length===0?"未找到匹配规格，请选择更多规格":"请输入尺寸并点测算拼版";info.innerHTML=m1;body.innerHTML='<tr><td colspan="9" style="text-align:center;color:#999;padding:20px">'+m1+'</td></tr>';return}
  card.style.display="block";var m=matches[0];
  info.innerHTML='匹配：<strong>'+m.m+'</strong> | '+m.l+' | '+m.i+' | '+m.md+' | 耐压 '+m.v+' | '+m.t+' | '+m.c;
  var vs=selectedSpec.via>15?Math.ceil(selectedSpec.via-15)*3:0,pa=panelResults[selectedArrIdx].area,pq=panelResults[selectedArrIdx].qty,h="";
   var supColors={},colorIdx=0;var colorNames=["正创","鑫阳","健达","豪鹏赢","其它"];
   SUP.forEach(function(su){
     var v=m[su.c];if(v===null||v===undefined)return;
     if(selectedProc!==null){var procType=su.c.split('_')[1];if(procType!==selectedProc)return;}
     var up=v+vs,total=up*pa,pu=pq>0?total/pq:0,note="";
     if(su.n==="正创")note="绿油/黑油+5/㎡ 底面字符+5/㎡";else if(su.n==="鑫阳")note="CNC+50/㎡ 喷锡+25/㎡ 半孔+30/㎡";else if(su.n==="健达")note="最低消费另计";
     if(vs>0)note+=(note?" ":"")+"超孔+"+vs+"元/㎡";
     if(supColors[su.n]===undefined){supColors[su.n]=colorIdx%8;colorIdx++}
     var bgCls="sup-bg-"+supColors[su.n];
     h+='<tr class="'+bgCls+'"><td style="font-weight:600">'+su.n+'</td><td>'+su.s+'</td><td class="price-num">'+v+'</td><td>'+(vs>0?'<span style="color:#e74c3c">+'+vs+'</span>':'-')+'</td><td>'+pa.toFixed(4)+'</td><td>'+pq+'</td><td class="price-num">'+total.toFixed(2)+'</td><td class="pn2-cell">'+pu.toFixed(4)+'</td><td style="font-size:10px;color:#999">'+note+'</td></tr>';
   });
  h='<tr style="background:#fff8f0"><td style="font-weight:600">模拟测算</td><td>-</td><td><input type="number" id="simPrice" oninput="calcSim()" value="'+simPrice+'" style="width:65px;padding:3px 5px;border:1px solid #e2e6ed;border-radius:5px;font-size:12px;text-align:center" placeholder="输入单价"></td><td>-</td><td>'+pa.toFixed(4)+'</td><td>'+pq+'</td><td id="simTotal" class="price-num">-</td><td id="simPU" class="pn2-cell">-</td><td style="font-size:10px;color:#999">自定义</td></tr>'+h;body.innerHTML=h;calcSim();document.getElementById("notesArea").innerHTML=NOTES;
}
